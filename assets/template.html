<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { CSS2DRenderer, CSS2DObject } from "three/addons/renderers/CSS2DRenderer.js";
import { Line2 } from "three/addons/lines/Line2.js";
import { LineMaterial } from "three/addons/lines/LineMaterial.js";
import { LineGeometry } from "three/addons/lines/LineGeometry.js";
let currentData;
let currentPartIndex = 0;
const container = document.getElementById("scene-container");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(6, 4, 8);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);
const labelRenderer = new CSS2DRenderer();
labelRenderer.domElement.style.position = "absolute";
labelRenderer.domElement.style.top = "0";
labelRenderer.domElement.style.pointerEvents = "none";
container.appendChild(labelRenderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.target.set(0, 0, 0);
controls.addEventListener('change', updateHiddenLines);
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const backLight = new THREE.DirectionalLight(0xffffff, 0.25);
backLight.position.set(-5, 0, -5);
scene.add(backLight);
const gridHelper = new THREE.GridHelper(10, 10, 0x888888, 0xcccccc);
gridHelper.position.y = -1.0;
scene.add(gridHelper);

function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
}
window.addEventListener("resize", resize);
resize();
let sceneGeomGroup = null;
const sceneEntities = { vertices: new Map(), edges: new Map(), faces: new Map(), conditions: new Map(), auxElements: [] };

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  updateHiddenLines();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

function focusCameraOnScene() {
  // 仅基于 sceneEntities 几何体计算包围盒，GridHelper 排除在外
  const box = new THREE.Box3();
  sceneEntities.vertices.forEach((v) => { box.expandByPoint(v.pos); });
  if (box.isEmpty()) return;
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = (maxDim || 5) * 1.8;
  camera.position.set(center.x + dist * 0.5, center.y + dist * 0.3, center.z + dist * 0.7);
  controls.target.copy(center);
  controls.update();
}
document.querySelectorAll(".view-mode-btn button").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".view-mode-btn button").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    const mode = btn.dataset.mode;
    const center = controls.target;
    const d = camera.position.distanceTo(center);
    if (mode === "perspective") camera.position.set(center.x + 6, center.y + 4, center.z + 8);
    else if (mode === "top") camera.position.set(center.x, center.y + d, center.z + 0.01);
    else if (mode === "front") camera.position.set(center.x, center.y, center.z + d);
    controls.update();
  });
});


function appendFormattedMath(parent, text) {
  const source = String(text ?? "");
  let i = 0;
  function appendPlain(value) { if (value) parent.appendChild(document.createTextNode(value)); }
  function appendSup(value) { const sup = document.createElement("sup"); sup.textContent = value; parent.appendChild(sup); }
  function appendSub(value) { const sub = document.createElement("sub"); sub.textContent = value; parent.appendChild(sub); }
  while (i < source.length) {
    if (source[i] === "\n") { parent.appendChild(document.createElement("br")); i++; continue; }
    if (source.startsWith("sqrt(", i)) {
      let j = i + 5;
      let depth = 1;
      while (j < source.length && depth > 0) {
        if (source[j] === "(") depth++;
        else if (source[j] === ")") depth--;
        if (depth > 0) j++;
      }
      const wrap = document.createElement("span");
      wrap.className = "math-sqrt";
      const radical = document.createElement("span");
      radical.textContent = "\u221a";
      const radicand = document.createElement("span");
      radicand.className = "math-radicand";
      appendFormattedMath(radicand, source.slice(i + 5, j));
      wrap.appendChild(radical);
      wrap.appendChild(radicand);
      parent.appendChild(wrap);
      i = Math.min(j + 1, source.length);
      continue;
    }
    if (source[i] === "^") {
      i++;
      if (source[i] === "(") {
        const j = source.indexOf(")", i + 1);
        appendSup(j >= 0 ? source.slice(i + 1, j) : source.slice(i + 1));
        i = j >= 0 ? j + 1 : source.length;
      } else {
        const m = source.slice(i).match(/^[A-Za-z0-9]+/);
        appendSup(m ? m[0] : source[i] || "");
        i += m ? m[0].length : 1;
      }
      continue;
    }
    const letterDigit = source.slice(i).match(/^([A-Za-z]+)(\d+)/);
    if (letterDigit) {
      appendPlain(letterDigit[1]);
      appendSub(letterDigit[2]);
      i += letterDigit[0].length;
      continue;
    }
    appendPlain(source[i]);
    i++;
  }
}

function createMathSpan(text, className) {
  const span = document.createElement("span");
  span.className = className || "math-inline";
  appendFormattedMath(span, text);
  return span;
}

function renderMathBlock(element, text) {
  element.textContent = "";
  element.appendChild(createMathSpan(text, "math-inline"));
}

function createVertexLabel(text) {
  const div = document.createElement("div");
  div.className = "vertex-label";
  appendFormattedMath(div, text);
  return div;
}

// ---------- Task 3: Geometry Builder ----------

function buildGeometry(data) {
  if (sceneGeomGroup) { scene.remove(sceneGeomGroup); }
  const group = new THREE.Group();
  sceneEntities.vertices.clear(); sceneEntities.edges.clear(); sceneEntities.faces.clear();
  const vertMap = {};
  data.solids.forEach((solid) => {
    solid.vertices.forEach((v) => {
      const sp = new THREE.Mesh(new THREE.SphereGeometry(0.0175, 12, 12), new THREE.MeshBasicMaterial({ color: 0x333333 }));
      sp.position.set(v.pos[0], v.pos[2], v.pos[1]);
      sp.userData = { entityType: "vertex", id: v.id, label: v.label };
      if (v.axisEndpoint === true) sp.visible = false;
      group.add(sp);
      const div = createVertexLabel(v.label || "");
      const lbl = new CSS2DObject(div);
      lbl.position.set(v.pos[0], v.pos[2], v.pos[1] + 0.16);
      if (v.axisEndpoint === true || !v.label) {
        lbl.visible = false;
        if (lbl.element) lbl.element.style.display = "none";
      }
      group.add(lbl);
      const pos = new THREE.Vector3(v.pos[0], v.pos[2], v.pos[1]);
      vertMap[v.id] = { mesh: sp, label: lbl, pos };
      // isOriginal: 标记为题目中已有的原顶点（区别于交点 isIntersection: true）
      // 用 A-Z 字母的题目顶点会被算作"已占 ID"，跳过阶段 1 分配
      sceneEntities.vertices.set(v.id, { mesh: sp, label: lbl, pos, isOriginal: true, partIds: v.partIds || [], renderMode: v.renderMode || "auto", auxiliary: v.auxiliary === true, axisEndpoint: v.axisEndpoint === true });
    });
    solid.edges.forEach((e) => {
      const v1 = vertMap[e.v1], v2 = vertMap[e.v2];
      const geo = new LineGeometry();
      geo.setPositions([v1.pos.x, v1.pos.y, v1.pos.z, v2.pos.x, v2.pos.y, v2.pos.z]);
      const solidMat = new LineMaterial({ color: 0x222222, linewidth: 2, worldUnits: false, alphaToCoverage: true });
      const dashedMat = new LineMaterial({ color: 0x222222, linewidth: 2, worldUnits: false, dashed: true, dashSize: 0.12, gapSize: 0.08, alphaToCoverage: true });
      solidMat.resolution.set(container.clientWidth, container.clientHeight);
      dashedMat.resolution.set(container.clientWidth, container.clientHeight);
      const ln = new Line2(geo, e.dashed ? dashedMat : solidMat);
      ln.computeLineDistances();
      ln.userData = { entityType: "edge", id: e.id, v1: e.v1, v2: e.v2, dashedMat, solidMat };
      group.add(ln);
      const axisAdornment = e.renderMode === "axis" ? makeAxisArrow(v1.pos, v2.pos, e.color || "#339af0", e.axisLabel || "") : null;
      if (axisAdornment) group.add(axisAdornment);
      sceneEntities.edges.set(e.id, { line: ln, axisAdornment, _dashedMat: dashedMat, _solidMat: solidMat, renderMode: e.renderMode || "auto", auxiliary: e.auxiliary === true, partIds: e.partIds || [] });
    });
    solid.faces.forEach((f) => {
      const verts = f.vertices.map((id) => vertMap[id]).filter(Boolean).map((v) => v.pos);
      if (verts.length < 3) return;
      const pos = [];
      for (let i = 1; i < verts.length - 1; i++) { pos.push(verts[0].x, verts[0].y, verts[0].z, verts[i].x, verts[i].y, verts[i].z, verts[i + 1].x, verts[i + 1].y, verts[i + 1].z); }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
      geo.computeVertexNormals();
      const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.0, side: THREE.DoubleSide, depthWrite: false, visible: false });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.userData = { entityType: "face", id: f.id, vertexIds: f.vertices };
      group.add(mesh);
      const faceVerts$ = f.vertices.map(id => vertMap[id]).filter(Boolean).map(v => v.mesh.position.clone());
      mesh.visible = false;
      // 缓存 vertexIds 以便后续高亮逻辑能根据 ID 找到该面的边和顶点
      sceneEntities.faces.set(f.id, { mesh, vertices: faceVerts$, vertexIds: f.vertices.slice(), partIds: f.partIds || [], renderMode: f.renderMode || "auto", auxiliary: f.auxiliary === true });
    });
  });
  scene.add(group);
  sceneGeomGroup = group;
  return group;
}

function ghostEntities(visibleIds) {
  const set = new Set(visibleIds || []);
  function apply(map, opacityVisible, opacityHidden) {
    map.forEach((obj, id) => {
      const isVisible = set.has(id);
      if (obj.mesh) { obj.mesh.material.transparent = true; obj.mesh.material.opacity = isVisible ? opacityVisible : opacityHidden; obj.mesh.material.needsUpdate = true; }
      if (obj.line) { const m = obj.line.material; m.transparent = true; m.opacity = isVisible ? opacityVisible : opacityHidden; m.needsUpdate = true; }
    });
  }
  apply(sceneEntities.vertices, 1, 0.12);
  apply(sceneEntities.edges, 1, 0.12);
  apply(sceneEntities.faces, 0.4, 0.06);
}

function resetOpacity() {
  sceneEntities.vertices.forEach((v) => { v.mesh.material.transparent = false; v.mesh.material.opacity = 1; });
  sceneEntities.edges.forEach((e) => { e._solidMat.transparent = false; e._solidMat.opacity = 1; e._dashedMat.transparent = false; e._dashedMat.opacity = 1; });
  sceneEntities.faces.forEach((f) => { f.mesh.material.transparent = true; f.mesh.material.opacity = 0.0; });
}

function clearGeometry() {
  if (sceneGeomGroup) { scene.remove(sceneGeomGroup); sceneGeomGroup = null; }
  // 交点的 mesh/label 是直接加到 scene 的,不归 sceneGeomGroup 管,需要单独清
  clearAllIntersectionPoints();
  sceneEntities.vertices.clear(); sceneEntities.edges.clear(); sceneEntities.faces.clear();
}

// ---------- Task 4: Condition Renderer ----------

function renderConditions(data) {
  sceneEntities.conditions.forEach((entry) => { entry.annotations.forEach((a) => scene.remove(a)); });
  sceneEntities.conditions.clear();
  data.conditions.forEach((cond) => {
    switch (cond.type) {
      case "perpendicular": renderPerpendicular(cond); break;
      case "parallel": renderParallel(cond); break;
      case "length": renderLength(cond); break;
      case "equal-length": renderEqualLength(cond); break;
      case "angle": case "right-angle": renderAngle(cond); break;
      case "midpoint": renderMidpoint(cond); break;
      case "ratio": renderRatio(cond); break;
      case "equal-angle": renderEqualAngle(cond); break;
    }
  });
}

// ---------- 边/面/顶点 健壮查找 ----------

// 通过ID查找边。自动处理反向匹配：例如数据中边ID为"DA"，

// 查询"AD"也能命中（只要是同一条无向边）。

function _findEdgeById(id) {
  if (!id) return null;
  let e = sceneEntities.edges.get(id);
  if (e) return e;
  if (id.length === 2) {
    const rev = id[1] + id[0];
    e = sceneEntities.edges.get(rev);
    if (e) return e;
  }
  // 兜底：遍历所有边，比较其 userData.v1/v2 组合
  const a = id[0], b = id[1];
  for (const [eid, ent] of sceneEntities.edges) {
    const ud = ent.line && ent.line.userData;
    if (!ud) continue;
    if ((ud.v1 === a && ud.v2 === b) || (ud.v1 === b && ud.v2 === a)) return ent;
  }
  return null;
}

function _findEdgeIdById(id) {
  if (!id) return null;
  if (sceneEntities.edges.has(id)) return id;
  if (id.length === 2) {
    const rev = id[1] + id[0];
    if (sceneEntities.edges.has(rev)) return rev;
  }
  return null;
}

function getMidpoint(edgeId) {
  const e = _findEdgeById(edgeId);
  if (!e) return null;
  const d = e.line.userData;
  const p1 = getVertexPos(d.v1), p2 = getVertexPos(d.v2);
  if (!p1 || !p2) return null;

// ---------- Task 5.5: Auxiliary Line Intersection Detection ----------

// 相交检测阈值（与 SnapEngine 阈值一致，略大以容忍浮点误差）
const INTERSECT_EPSILON = 0.025;

// 交点专用颜色（与原顶点 #333333 区分，红色）
const INTERSECT_COLOR = 0xfa5252;

// 从 LineMaterial/LineGeometry 边实体中提取两端点（Vector3）

function _getLineSegmentEndpointsFromEdgeEntity(edgeEntity) {
  const ln = edgeEntity && edgeEntity.line;
  if (!ln || !ln.geometry) return null;
  const g = ln.geometry;
  if (g.attributes && g.attributes.instanceStart && g.attributes.instanceEnd) {
    const a = g.attributes.instanceStart.array;
    const b = g.attributes.instanceEnd.array;
      const endOff = b.length >= 6 ? 3 : 0; return [new THREE.Vector3(a[0], a[1], a[2]), new THREE.Vector3(b[endOff], b[endOff+1], b[endOff+2])];

// 两条线段的最近点对距离：若 < epsilon 则视为相交，返回中点

// 注: 该函数不依赖 r161+ 的 Line3 API

// 使用 r160 既有的 closestPointToPoint 双向交替投影实现

// 两线段最近点：用纯向量投影迭代，不依赖 Three.js Line3（避免内部 target 对象污染）
function segmentSegmentClosest(a0, a1, b0, b1, epsilon) {
  if (epsilon === undefined) epsilon = INTERSECT_EPSILON;
  if (isNaN(a0.x+a0.y+a0.z) || isNaN(a1.x+a1.y+a1.z) || isNaN(b0.x+b0.y+b0.z) || isNaN(b1.x+b1.y+b1.z)) return null;

    const pp = p.clone();
    p = project(q, b0, b1);
    q = project(p, a0, a1);
    if (pp.distanceToSquared(p) < 1e-16) break;
    if (isNaN(p.x) || isNaN(q.x)) return null;

// 从一个辅助元素条目中提取所有参与相交检测的线段（圆、标注跳过）

function extractAuxLineSegments(entry) {
  const segs = [];
  if (!entry || !entry.data) return segs;
  const t = entry.type;
  const d = entry.data;
  function pushSeg(arr1, arr2) {
    if (!arr1 || !arr2) return;
    const p1 = Array.isArray(arr1) ? new THREE.Vector3().fromArray(arr1) : arr1;
    const p2 = Array.isArray(arr2) ? new THREE.Vector3().fromArray(arr2) : arr2;
    if (p1 && p2) segs.push({ p1, p2 });
  }
  if (t === 'line-segment') pushSeg(d.p1, d.p2);
  else if (t === 'line-extend') {
    // 用整条延长线（ext1-ext2）参与相交检测
    pushSeg(d.ext1, d.ext2);
  } else if (t === 'angle-bisector') {
    // 角平分线：原段为 vertex->bisPt，长度有限，延长（双向）以覆盖更广的交点检测
    if (d.vertex && d.bisPt) {
      const v = Array.isArray(d.vertex) ? new THREE.Vector3().fromArray(d.vertex) : new THREE.Vector3(d.vertex.x, d.vertex.y, d.vertex.z);
      const b = Array.isArray(d.bisPt) ? new THREE.Vector3().fromArray(d.bisPt) : new THREE.Vector3(d.bisPt.x, d.bisPt.y, d.bisPt.z);
      const dir = new THREE.Vector3().subVectors(b, v);
      const origLen = dir.length();
      if (origLen > 1e-6) {
        dir.normalize();
        // 只向 bisector 正方向延长，反方向仅保留一小段（避免生成大量假交点）
        const EXTEND = Math.max(4.0, origLen * 4.0);
        // 只向 bisector 正方向适当延长，不反向延长避免假交点
        segs.push({ p1: v.clone(), p2: b.clone().add(dir.clone().multiplyScalar(EXTEND)) });
      } else {
        pushSeg(d.vertex, d.bisPt);
      }
    } else {
      pushSeg(d.vertex, d.bisPt);
    }
  }
  else if (t === 'line-perp') pushSeg(d.p1, d.p2);
  else if (t === 'line-para') pushSeg(d.p1, d.p2);
  else if (t === 'face-3p') {
    if (Array.isArray(d.pts)) {
      for (let i = 0; i < d.pts.length; i++) pushSeg(d.pts[i], d.pts[(i + 1) % d.pts.length]);
    }
  } else if (t === 'face-4p') {
    if (Array.isArray(d.pts)) {
      for (let i = 0; i < d.pts.length; i++) pushSeg(d.pts[i], d.pts[(i + 1) % d.pts.length]);
    }
  } else if (t === 'face-lp') {
    pushSeg(d.p1, d.p2); pushSeg(d.p2, d.p3); pushSeg(d.p3, d.p1);
  }
  // circle-* / annotate-* 不参与相交检测
  return segs;
}

// 从已用 ID 集合中，按用户期望顺序选出下一个未占用的 ID

// 顺序：A..Z，再 A1..Z1, A2..Z2, ..., A99..Z99（已占用则跳过）

function nextAvailableIdFrom(usedSet) {
  // 阶段 1：单字母 A-Z（occupied 的会被跳过）
  for (let c = 65; c <= 90; c++) {  // A=65, Z=90
    const letter = String.fromCharCode(c);
    if (!usedSet.has(letter)) return letter;
  }
  // 阶段 2：A1..Z1, A2..Z2, ..., A99..Z99（已占用则跳过）
  for (let i = 1; i <= 99; i++) {
    for (let c = 65; c <= 90; c++) {  // A=65, Z=90
      const id = String.fromCharCode(c) + i;
      if (!usedSet.has(id)) return id;
    }
  }
  return '?';
}

// 分配下一个可用 ID：单字母 A..Z，然后 A1..Z1, A2..Z2, ...（基于当前 sceneEntities.vertices 中所有 id）

// 新交点不会与原顶点 / 已有交点重复（候选点去重 + nextAvailableIdFrom 双保险）

// 向后兼容：保留 nextAvailableLetter 名称，内部委托给 nextAvailableIdFrom

function nextAvailableLetter() {

}

// 创建交点的小圆点（红色，区别于原顶点的 0x333333）

function makeIntersectionSphere(point) {

// 创建交点的字母标签（红色字体 + 浅色背景，数字下标比字母小一号）

// 创建交点的字母标签（红色字体 + 浅色背景，数字下标比字母小一号）
function makeIntersectionLabel(text, point) {

  const match = text.match(/^([A-Z]+)(\d+)$/);

function clearAllIntersectionPoints() {

    const v = sceneEntities.vertices.get(id);

// 添加一个交点到 sceneEntities.vertices；如距离已有顶点（含原顶点或已有交点）太近则跳过

function addIntersectionPoint(point) {
  // 去重：与任意已有顶点距离 < 阈值 则跳过
  let dup = false;
  sceneEntities.vertices.forEach((v) => {
    if (v.pos && v.pos.distanceTo(point) < INTERSECT_EPSILON) dup = true;
  });
  if (dup) return null;
  const id = nextAvailableLetter();
  return addIntersectionPointRaw(id, point);
}

// 用指定 id 创建一个交点（不做距离去重、不分配字母；用于稳定编号恢复）

// 注意：调用方需自行保证 id 不与 sceneEntities.vertices 已有 id 冲突

function addIntersectionPointRaw(id, point) {
  const mesh = makeIntersectionSphere(point);
  const label = makeIntersectionLabel(id, point);
  scene.add(mesh);
  scene.add(label);
  sceneEntities.vertices.set(id, { mesh, label, pos: point.clone(), isIntersection: true });

// 重新计算所有交点：

//   - 保留已有交点 id（按位置匹配恢复），保证编号稳定

//   - 新发现的交点按 G, H, ..., Z, G1, H1, ..., Z1, G2, H2, ... 顺序分配新 id

//   - id 不会与原顶点（题目中已存在的 A,B,C,...）重复；落在原顶点上的候选点会被丢弃

function recomputeAllIntersections() {
  // 1) 收集"重算前"的交点 id + 位置
  const existingPoints = [];
  sceneEntities.vertices.forEach((v, id) => {
    if (v.isIntersection) {
      existingPoints.push({ id, pos: v.pos.clone() });
    }
  });
  // 2) 清理所有交点
  clearAllIntersectionPoints();
  if (!sceneEntities.auxElements || sceneEntities.auxElements.length === 0) return;
  // 3) 收集所有辅助线段
  const auxSegs = [];
  sceneEntities.auxElements.forEach((entry, idx) => {
    const segs = extractAuxLineSegments(entry);
    segs.forEach((s) => auxSegs.push({ p1: s.p1, p2: s.p2, sourceIdx: idx, sourceType: entry.type }));
  });
  // 4) 收集所有候选交点位置（去重）
  // 4-pre) 预先收集"非交点（原顶点）"位置：候选点落在原顶点上时不分配新编号
  const nonIntersectPositions = [];
  sceneEntities.vertices.forEach((v) => {
    if (!v.isIntersection && v.pos) nonIntersectPositions.push(v.pos);
  });
  const candidates = []; // Vector3[]
  const tryAddCandidate = (pt) => {
    if (!pt) return;
    if (isNaN(pt.x) || isNaN(pt.y) || isNaN(pt.z)) return;
    for (let i = 0; i < candidates.length; i++) {
      if (candidates[i].distanceTo(pt) < INTERSECT_EPSILON) return;
    }
    // 落在原顶点上的候选点直接丢弃，不分配新 ID
    for (let i = 0; i < nonIntersectPositions.length; i++) {
      if (nonIntersectPositions[i].distanceTo(pt) < INTERSECT_EPSILON) return;
    }

    candidates.push(pt);

  sceneEntities.edges.forEach((edge) => {
    const pts = _getLineSegmentEndpointsFromEdgeEntity(edge);
    if (!pts) return;
    auxSegs.forEach((seg) => {
      const pt = segmentSegmentClosest(seg.p1, seg.p2, pts[0], pts[1]);
      if (pt) tryAddCandidate(pt);

  });
  // 4b) 辅助线两两求交
  for (let i = 0; i < auxSegs.length; i++) {
    for (let j = i + 1; j < auxSegs.length; j++) {
      const segA = auxSegs[i], segB = auxSegs[j];

  candidates.sort((a, b) => {

    if (a.y !== b.y) return a.y - b.y;
    return a.z - b.z;

  //    用 isOriginal 显式判断比 !isIntersection 更稳健（防止交点被错误地当作原顶点遗漏）
  const usedIds = new Set();
  sceneEntities.vertices.forEach((v, id) => {
    if (v.isOriginal) usedIds.add(id);
  });
  // 5a) 先把已有交点按"位置匹配"恢复原字母（保证编号稳定）
  const matchedIdx = new Set();
  existingPoints.forEach((existing) => {
    let matchIdx = -1;
    for (let i = 0; i < candidates.length; i++) {
      if (matchedIdx.has(i)) continue;
      if (candidates[i].distanceTo(existing.pos) < INTERSECT_EPSILON) {
        matchIdx = i;
        break;
      }
    }
    if (matchIdx >= 0) {

      if (!usedIds.has(existing.id)) {
        addIntersectionPointRaw(existing.id, candidates[matchIdx]);
        matchedIdx.add(matchIdx);
        usedIds.add(existing.id);
      }

  });

  for (let i = 0; i < candidates.length; i++) {
    if (matchedIdx.has(i)) continue;
    const id = nextAvailableIdFrom(usedIds);
    addIntersectionPointRaw(id, candidates[i]);
    usedIds.add(id);
  }

  {
    const pts = [];
    sceneEntities.vertices.forEach((v, id) => { if (v.isIntersection) pts.push({ id, pos: v.pos }); });
    if (pts.length > 1) {
      pts.sort((a, b) => { if (a.pos.x !== b.pos.x) return a.pos.x - b.pos.x; if (a.pos.y !== b.pos.y) return a.pos.y - b.pos.y; return a.pos.z - b.pos.z; });
      const renumUsed = new Set();
      sceneEntities.vertices.forEach((v, id) => { if (v.isOriginal) renumUsed.add(id); });
      const renames = new Map();
      pts.forEach((pt) => { const nid = nextAvailableIdFrom(renumUsed); renumUsed.add(nid); renames.set(pt.id, nid); });
      // 需要 rename 才执行（避免不必要的 DOM 操作）
      let needRename = false;
      renames.forEach((nid, oid) => { if (oid !== nid) needRename = true; });
      if (needRename) {
        renames.forEach((nid, oid) => {
          if (oid === nid) return;
          const v = sceneEntities.vertices.get(oid);
          if (!v) return;
          sceneEntities.vertices.delete(oid);
          sceneEntities.vertices.set(nid, v);
          const m = nid.match(/^([A-Z]+)(\d+)$/);
          // 用 DOM API 更新标签文字（兼容 CSS2DRenderer）
          while (v.label.element.firstChild) v.label.element.removeChild(v.label.element.firstChild);
          if (m) { const s1 = document.createElement("span"); s1.style.fontSize = "14px"; s1.textContent = m[1]; v.label.element.appendChild(s1); const s2 = document.createElement("sub"); s2.style.fontSize = "10px"; s2.textContent = m[2]; v.label.element.appendChild(s2); } else { const s = document.createElement("span"); s.style.fontSize = "14px"; s.textContent = nid; v.label.element.appendChild(s); }
        });
      }
    }
  }
}

// 新增延长线后：检查与其它延长线的交点，并自动延长其它延长线到交点
function extendExtensionLinesToIntersections(newEntryIdx) {
  const newEntry = sceneEntities.auxElements[newEntryIdx];
  if (!newEntry || newEntry.type !== 'line-extend' || !newEntry.data) return;
  const d = newEntry.data;
  const np1 = Array.isArray(d.ext1) ? new THREE.Vector3().fromArray(d.ext1) : new THREE.Vector3(d.ext1.x, d.ext1.y, d.ext1.z);
  const np2 = Array.isArray(d.ext2) ? new THREE.Vector3().fromArray(d.ext2) : new THREE.Vector3(d.ext2.x, d.ext2.y, d.ext2.z);
  const nDir = new THREE.Vector3().subVectors(np2, np1);
  if (nDir.lengthSq() < 1e-12) return;
  nDir.normalize();
  let changed = false;
  for (let i = 0; i < sceneEntities.auxElements.length; i++) {
    if (i === newEntryIdx) continue;
    const entry = sceneEntities.auxElements[i];
    if (entry.type !== 'line-extend' || !entry.data) continue;
    const ed = entry.data;
    const ep1 = Array.isArray(ed.ext1) ? new THREE.Vector3().fromArray(ed.ext1) : new THREE.Vector3(ed.ext1.x, ed.ext1.y, ed.ext1.z);
    const ep2 = Array.isArray(ed.ext2) ? new THREE.Vector3().fromArray(ed.ext2) : new THREE.Vector3(ed.ext2.x, ed.ext2.y, ed.ext2.z);
    const pt = segmentSegmentClosest(np1, np2, ep1, ep2);
    if (!pt) continue;
    const eDir = new THREE.Vector3().subVectors(ep2, ep1).normalize();
    const dotCheck = new THREE.Vector3().subVectors(pt, ep2).dot(eDir);
    if (dotCheck < -INTERSECT_EPSILON) continue;
    ed.ext2 = pt.toArray();
    try { scene.remove(entry.group); } catch(e) {}
    const tool = toolManager.tools[entry.type];
    if (tool && tool.rebuild) {
      const newGrp = tool.rebuild(ed);
      if (newGrp) {
        entry.group = newGrp;
        newGrp.visible = entry.visible !== false;
        scene.add(newGrp);
      }
    }
    changed = true;
  }
  return changed;
}
function normalizeColorValue(color, fallback) {
  if (typeof color === "number") return color;

  return fallback;
}

function makeAxisArrow(start, end, color, label) {
  const dir = new THREE.Vector3().subVectors(end, start);

  if (len < 1e-6) return null;

  const arrow = new THREE.ArrowHelper(dir, start, len, col, Math.min(0.16, len * 0.18), Math.min(0.08, len * 0.08));
  group.add(arrow);

    const labelPos = new THREE.Vector3().copy(end).addScaledVector(dir, 0.12);
    const lbl = makeLabel(label, "#222222", labelPos);
    group.add(lbl);

}

function getEdgeDirectionFromVertex(edgeId, vertexId) {
  const edge = _findEdgeById(edgeId);
  const vertex = getVertexPos(vertexId);
  if (!edge || !vertex) return null;
  const endpoints = _getLineSegmentEndpointsFromEdgeEntity(edge);
  if (!endpoints) return null;
  const d0 = endpoints[0].clone().sub(vertex);
  const d1 = endpoints[1].clone().sub(vertex);
  const dir = d0.lengthSq() > d1.lengthSq() ? d0 : d1;
  if (dir.lengthSq() < 1e-10) return null;
  return dir.normalize();

function makeRightAngleMarker(vertexId, sideAId, sideBId, color) {

  if (!vertex || !d1 || !d2) return null;

  const p2 = p1.clone().addScaledVector(d2, size);
  const p3 = vertex.clone().addScaledVector(d2, size);

function renderLinePlanePerpendicularMarker(cond) {
  const targets = cond.targets || {};

  if (!edge || !face || !face.vertexIds || face.vertexIds.length < 2) return false;
  const endpoints = _getLineSegmentEndpointsFromEdgeEntity(edge);

    .find(([a, b]) => a === footId || b === footId);
  if (!side) return false;
  const sideEdge = Array.from(sceneEntities.edges.entries()).find(([, ent]) => {
    const ud = ent.line && ent.line.userData;
    return ud && ((ud.v1 === side[0] && ud.v2 === side[1]) || (ud.v1 === side[1] && ud.v2 === side[0]));
  });
  if (!sideEdge) return false;
  const marker = makeRightAngleMarker(footId, segment, sideEdge[0], cond.highlightColor || 0xff6b6b);
  if (!marker) return false;
  makeAnnotation(marker, cond.id);
  return true;
}

function makeLabel(text, color, pos) {

function setObjectTreeVisible(obj, visible) {

function renderLength(cond) {

function renderAngle(cond) {
  if (cond.type === "right-angle") {
    const targets = cond.targets || {};
    if (targets.vertex && Array.isArray(targets.sides) && targets.sides.length >= 2) {
      const marker = makeRightAngleMarker(targets.vertex, targets.sides[0], targets.sides[1], cond.highlightColor || 0xff6b6b);
      if (marker) makeAnnotation(marker, cond.id);
      return;
    }
  }  const v = cond.targets.vertex;
  const sides = cond.targets.sides || [];
  const pos = getVertexPos(v);
  const p1 = getMidpoint(sides[0]); const p2 = getMidpoint(sides[1]);
  if (!pos || !p1 || !p2) return;
  const d1 = p1.clone().sub(pos).normalize();
  const d2 = p2.clone().sub(pos).normalize();
  const col = cond.highlightColor || 0xfcc419;
  const radius = 0.2;
  const ang = Math.acos(Math.max(-1, Math.min(1, d1.dot(d2))));
  // 角平面的法向量与"第二基向量"，保证弧线在角平面内
  const normal = new THREE.Vector3().crossVectors(d1, d2);
  if (normal.lengthSq() < 1e-10) {
    if (Math.abs(d1.x) < 0.9) normal.set(1, 0, 0); else normal.set(0, 1, 0);
    normal.crossVectors(d1, normal);
  }
  normal.normalize();
  const binormal = new THREE.Vector3().crossVectors(normal, d1).normalize();
  const pts = [];
  for (let i = 0; i <= 20; i++) {
    const t = (i / 20) * ang;
    pts.push(new THREE.Vector3()
      .copy(pos)
      .add(new THREE.Vector3().copy(d1).multiplyScalar(radius * Math.cos(t)))
      .add(new THREE.Vector3().copy(binormal).multiplyScalar(radius * Math.sin(t)))
    );
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: col });
  const arc = new THREE.Line(geo, mat);
  makeAnnotation(arc, cond.id);
  if (cond.value) {
    const halfT = ang / 2;
    const labelDir = new THREE.Vector3()
      .copy(d1).multiplyScalar(Math.cos(halfT))
      .add(new THREE.Vector3().copy(binormal).multiplyScalar(Math.sin(halfT)))
      .normalize();
    const lp = new THREE.Vector3().copy(pos).add(labelDir.multiplyScalar(radius + 0.12));
    const lbl = makeLabel(cond.value + "\u00b0", "#e67700", lp);
    makeAnnotation(lbl, cond.id);
  }
}

// ---------- Condition highlight coloring ----------

function applyHighlights() {
  const activeIds = new Set();
  // 收集所有可见条件的 conditionId
  sceneEntities.conditions.forEach((entry, id) => {
    if (entry.visible !== false) {
      entry.annotations.forEach((a) => {
        if (a.userData && a.userData.conditionId) activeIds.add(a.userData.conditionId);
      });
    }
  });
  // 1) 默认恢复原色（交点除外，保持红色）
  sceneEntities.vertices.forEach((v) => { if (v.isIntersection) return; v.mesh.material.color.set(0x333333); });
  sceneEntities.edges.forEach((e) => {
    e._solidMat.color.set(0x222222);
    e._dashedMat.color.set(0x222222);
  });
  sceneEntities.faces.forEach((f) => {
    f.mesh.material.color.set(0xffffff);
    f.mesh.material.opacity = 0.0;
    f.mesh.material.transparent = true;
    f.mesh.material.needsUpdate = true;
    f.mesh.visible = false;
  });
  // 2) 高亮活跃条件的元素
  if (currentData && currentData.conditions) {
    currentData.conditions.forEach((cond) => {
      const entry = sceneEntities.conditions.get(cond.id);
      if (!entry || entry.visible === false) return;
      const color = new THREE.Color(cond.highlightColor || '#ff6b6b');
      const targets = cond.targets || {};
      // ── 收集要高亮的 边ID ──
      // 支持: segment / line / lineA / lineB / line1 / line2 / segments[] / segment1/segment2
      const edgeIds = [];
      if (targets.segment) edgeIds.push(targets.segment);
      if (targets.line) edgeIds.push(targets.line);
      if (targets.lineA) edgeIds.push(targets.lineA);
      if (targets.lineB) edgeIds.push(targets.lineB);
      if (targets.line1) edgeIds.push(targets.line1);
      if (targets.line2) edgeIds.push(targets.line2);
      if (Array.isArray(targets.segments)) edgeIds.push(...targets.segments);
      if (targets.segment1) edgeIds.push(targets.segment1);
      if (targets.segment2) edgeIds.push(targets.segment2);
      // ── 收集要高亮的 顶点ID ──
      const vertexIds = [];
      if (targets.vertex) vertexIds.push(targets.vertex);
      if (Array.isArray(targets.vertices)) vertexIds.push(...targets.vertices);
      if (Array.isArray(targets.points)) vertexIds.push(...targets.points);
      // ── 收集涉及的所有 面ID ──
      const faceIds = []
        .concat(targets.face || [])
        .concat(targets.faces || [])
        .concat(targets.faceA || [])
        .concat(targets.faceB || []);
      // 面条件：自动把面包含的边全部加入；并把面的所有顶点加入高亮集合（Bug 1）
      // 注意：必须用 face.vertexIds（顶点ID），不能直接用 face.vertices（那是 Vector3 数组，拼接后不是合法的边ID）
      faceIds.forEach((fid) => {
        const face = sceneEntities.faces.get(fid);
        if (!face || !face.vertexIds) return;
        const n = face.vertexIds.length;
        for (let i = 0; i < n; i++) {
          const a = face.vertexIds[i], b = face.vertexIds[(i + 1) % n];
          const eid = _findEdgeIdById(a + b);
          if (eid) edgeIds.push(eid);
        }
        // Bug 1：面涉及的所有顶点都要高亮
        face.vertexIds.forEach((vid) => vertexIds.push(vid));
      });
      // Bug 2：当 targets 包含两个面时（faceA + faceB），自动计算公共顶点和公共边（交线）
      if (targets.faceA && targets.faceB) {
        const faceAEnt = sceneEntities.faces.get(targets.faceA);
        const faceBEnt = sceneEntities.faces.get(targets.faceB);
        if (faceAEnt && faceAEnt.vertexIds && faceBEnt && faceBEnt.vertexIds) {
          const setA = new Set(faceAEnt.vertexIds);
          const commonVerts = faceBEnt.vertexIds.filter((id) => setA.has(id));
          // 公共顶点
          commonVerts.forEach((vid) => vertexIds.push(vid));
          // 公共边：每对公共顶点之间都尝试在 edges 中找到对应的边
          for (let i = 0; i < commonVerts.length; i++) {
            for (let j = i + 1; j < commonVerts.length; j++) {
              const a = commonVerts[i], b = commonVerts[j];
              const eid = _findEdgeIdById(a + b);
              if (eid) edgeIds.push(eid);
            }
          }
        }
      }
      // 边ID 去重
      const seenE = new Set();
      const uniqEdgeIds = edgeIds.filter((eid) => {
        const real = _findEdgeIdById(eid);
        if (!real) return false;
        if (seenE.has(real)) return false;
        seenE.add(real);
        return true;
      });
      uniqEdgeIds.forEach((eid) => {
        const edge = sceneEntities.edges.get(eid);
        if (edge) {
          edge._solidMat.color.copy(color);
          edge._dashedMat.color.copy(color);
        }
      });
      // 顶点ID 去重并高亮
      const seenV = new Set();
      vertexIds.forEach((vid) => {
        if (seenV.has(vid)) return;
        seenV.add(vid);
        if (sceneEntities.vertices.has(vid)) {
          sceneEntities.vertices.get(vid).mesh.material.color.copy(color);
        }
      });
      // ── 面高亮（半透明色块）──
      faceIds.forEach((fid) => {
        const face = sceneEntities.faces.get(fid);
        if (!face) return;
        face.mesh.material.color.copy(color);
        face.mesh.material.opacity = 0.45;
        face.mesh.material.transparent = true;
        face.mesh.material.side = THREE.DoubleSide;
        face.mesh.material.depthWrite = false;
        face.mesh.material.needsUpdate = true;
        face.mesh.visible = true;
      });
    });
  }
}

// ---------- Task 5: Step Manager ----------
let currentStep = -1;

function resetStepColors() {
  sceneEntities.vertices.forEach((v) => { if (v.isIntersection) return; v.mesh.material.color.set(0x333333); });
  sceneEntities.edges.forEach((e) => {
    e._solidMat.color.set(0x222222);
    e._dashedMat.color.set(0x222222);
  });
}
currentStep = -1;
let stepAnnotations = [];

function applyStep(data, stepIndex) {
  if (stepIndex < 0 || stepIndex >= data.solutionSteps.length) return;
  const step = data.solutionSteps[stepIndex];
  const raw = step.highlights || [];
  // Bug 3：highlights 同时支持 顶点ID（如 "A"）和 边ID（如 "AD"）。
  // 先把每个 id 分类到 hlVerts / hlEdges。
  const hlVerts = new Set();
  const hlEdges = new Set();
  raw.forEach((id) => {
    if (typeof id !== "string") return;
    if (sceneEntities.vertices.has(id)) {
      hlVerts.add(id);
    } else {
      const eid = _findEdgeIdById(id);
      if (eid) hlEdges.add(eid);
    }
  });
  // 保留"两端点都在高亮顶点集中 → 该边也高亮"的旧行为
  sceneEntities.edges.forEach((e, id) => {
    if (hlEdges.has(id)) return;
    const ud = e.line.userData;
    if (ud && hlVerts.has(ud.v1) && hlVerts.has(ud.v2)) hlEdges.add(id);
  });
  sceneEntities.vertices.forEach((v, id) => {
    if (v.isIntersection) return; // 交点始终保持红色,不参与高亮变化
    v.mesh.material.color.set(hlVerts.has(id) ? 0xff922b : 0x333333);
  });
  sceneEntities.edges.forEach((e, id) => {
    const isHL = hlEdges.has(id);
    e._solidMat.color.set(isHL ? 0xff922b : 0x222222);
    e._dashedMat.color.set(isHL ? 0xff922b : 0x222222);
  });
  stepAnnotations.forEach((a) => scene.remove(a));
  stepAnnotations = [];
  (step.annotations || []).forEach((ann) => {
    if (ann.type === "auxiliary-line") {
      const p1 = getVertexPos(ann.points[0]), p2 = getVertexPos(ann.points[1]);
      if (!p1 || !p2) return;
      const pts = [p1, p2];
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineDashedMaterial({ color: ann.color || 0xff6b6b, dashSize: 0.04, gapSize: 0.04 });
      const ln = new THREE.Line(geo, mat);
      ln.computeLineDistances();
      scene.add(ln);
      stepAnnotations.push(ln);
    }
  });
  if (step.focusCamera) {
    camera.position.set(step.focusCamera.pos[0], step.focusCamera.pos[1], step.focusCamera.pos[2]);
    controls.target.set(step.focusCamera.target[0], step.focusCamera.target[1], step.focusCamera.target[2]);
    controls.update();
  }
  updateProgressiveAuxVisibility(data, stepIndex);
  currentStep = stepIndex;
  updateStepUI(stepIndex);
}

function updateStepUI(idx) {
  document.querySelectorAll(".step-item").forEach((el, i) => {
    el.classList.toggle("active", i === idx);
    const s = el.querySelector(".step-status");
    if (s) s.textContent = i < idx ? "\u2714" : i === idx ? "\u25CF" : "\u25CB";
  });
}


function isAuxiliaryEntity(entity) {
  return !!entity && (entity.auxiliary === true || entity.renderMode === "auxiliary" || entity.renderMode === "axis");
}

function getStepRevealIds(data, stepIndex) {
  const ids = new Set();
  const steps = Array.isArray(data && data.solutionSteps) ? data.solutionSteps : [];
  for (let i = 0; i <= stepIndex && i < steps.length; i++) {
    (steps[i].highlights || []).forEach((id) => {
      if (typeof id === "string") ids.add(id);
    });
  }
  return ids;
}

function updateProgressiveAuxVisibility(data, stepIndex) {
  const revealIds = getStepRevealIds(data, stepIndex);
  const partId = data && data.activePart ? data.activePart.id : null;
  function visibleForPart(entity) {
    if (!entity || !Array.isArray(entity.partIds) || entity.partIds.length === 0 || !partId) return true;
    return entity.partIds.includes(partId);
  }
  function shown(id, entity) {
    return visibleForPart(entity) && (!isAuxiliaryEntity(entity) || revealIds.has(id));
  }
  sceneEntities.vertices.forEach((vertex, id) => {
    const visible = shown(id, vertex);
    if (vertex.mesh) vertex.mesh.visible = visible;
    if (vertex.label) {
      const labelVisible = visible && vertex.axisEndpoint !== true;
      vertex.label.visible = labelVisible;
      if (vertex.label.element) vertex.label.element.style.display = labelVisible ? "" : "none";
    }
  });
  sceneEntities.edges.forEach((edge, id) => {
    const visible = shown(id, edge);
    if (edge.line) edge.line.visible = visible;
    if (edge.axisAdornment) setObjectTreeVisible(edge.axisAdornment, visible);
  });
  sceneEntities.faces.forEach((face, id) => {
    if (isAuxiliaryEntity(face) && !shown(id, face) && face.mesh) face.mesh.visible = false;
  });
}

function getActivePartData(data) {
  const parts = Array.isArray(data.parts) ? data.parts : [];
  const part = parts[currentPartIndex] || null;
  if (!part) return data;
  const hasConditionFilter = Array.isArray(part.conditionIds);
  const conditionIds = new Set(part.conditionIds || []);
  const stepIds = new Set(part.stepIds || []);
  return {
    ...data,
    activePart: part,
    conditions: hasConditionFilter ? (data.conditions || []).filter((cond) => conditionIds.has(cond.id)) : (data.conditions || []),
    solutionSteps: (data.solutionSteps || []).filter((step) => stepIds.has(step.id))
  };
}

function syncPartVisibility(partData) {
  const partId = partData && partData.activePart ? partData.activePart.id : null;
  function visibleForPart(entity) {
    if (!entity || !Array.isArray(entity.partIds) || entity.partIds.length === 0 || !partId) return true;
    return entity.partIds.includes(partId);
  }
  sceneEntities.vertices.forEach((vertex) => {
    const shown = visibleForPart(vertex);
    if (vertex.mesh) vertex.mesh.visible = shown;
    if (vertex.label) vertex.label.visible = shown;
  });
  sceneEntities.edges.forEach((edge) => {
    const shown = visibleForPart(edge);
    if (edge.line) edge.line.visible = shown;
  });
  sceneEntities.faces.forEach((face) => {
    const shown = visibleForPart(face);
    if (face.mesh) face.mesh.visible = shown && face.mesh.visible;
  });
}

function splitTheoremSentences(text) {
  const source = String(text || "").trim();
  if (!source) return [];
  const parts = source.match(/[^。；;？！!?]+[。；;？！!?]?/g) || [source];
  return parts.map((part) => part.trim()).filter(Boolean);
}

function buildEdgeAdjacency(data) {
  const adj = {};
  data.solids.forEach(solid => {
    solid.faces.forEach(face => {
      for (let i = 0; i < face.vertices.length; i++) {
        const v1 = face.vertices[i], v2 = face.vertices[(i+1)%face.vertices.length];
        const edge = solid.edges.find(e => (e.v1===v1&&e.v2===v2)||(e.v1===v2&&e.v2===v1));
        if (edge) { if (!adj[edge.id]) adj[edge.id] = []; if (!adj[edge.id].includes(face.id)) adj[edge.id].push(face.id); }
      }
    });
  });
  window._edgeAdjacency = adj;
}


function pointInsideFaceProjection(point, vertices, normal) {
  const ax = Math.abs(normal.x), ay = Math.abs(normal.y), az = Math.abs(normal.z);
  const drop = ax > ay && ax > az ? 'x' : (ay > az ? 'y' : 'z');
  function project(v) {
    if (drop === 'x') return [v.y, v.z];
    if (drop === 'y') return [v.x, v.z];
    return [v.x, v.y];
  }
  const p = project(point);
  const pts = vertices.map(project);
  let sign = 0;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    const cross = (b[0] - a[0]) * (p[1] - a[1]) - (b[1] - a[1]) * (p[0] - a[0]);
    if (Math.abs(cross) < 1e-7) continue;
    const current = cross > 0 ? 1 : -1;
    if (sign === 0) sign = current;
    else if (sign !== current) return false;
  }
  return true;
}


function areAllAdjacentFacesBackFacing(faceIds, faceData, eyePos) {
  if (!Array.isArray(faceIds) || faceIds.length < 2) return false;
  let checked = 0;
  for (const fid of faceIds) {
    const fd = faceData.get(fid);
    if (!fd) continue;
    checked++;
    if (fd.normal.dot(new THREE.Vector3().subVectors(eyePos, fd.center)) > 0) return false;
  }
  return checked >= 2;
}
function isPointOccludedByFaces(point, ownFaces, faceData, eyePos) {
  const own = new Set(ownFaces || []);
  const ray = new THREE.Vector3().subVectors(point, eyePos);
  const maxDist = ray.length();
  if (maxDist < 1e-7) return false;
  ray.normalize();
  for (const [fid, fd] of faceData) {
    if (own.has(fid)) continue;
    const denom = fd.normal.dot(ray);
    if (Math.abs(denom) < 1e-7) continue;
    const t = fd.normal.dot(new THREE.Vector3().subVectors(fd.center, eyePos)) / denom;
    if (t <= 1e-5 || t >= maxDist - 1e-5) continue;
    const hit = new THREE.Vector3().copy(eyePos).addScaledVector(ray, t);
    if (pointInsideFaceProjection(hit, fd.vertices, fd.normal)) return true;
  }
  return false;
}
function updateHiddenLines() {
  if (!sceneGeomGroup) return;

  const solidCenter = new THREE.Vector3();

  sceneEntities.vertices.forEach(v => { solidCenter.add(v.pos); vCount++; });
  if (vCount > 0) solidCenter.divideScalar(vCount);
  // 构建面数据：法线 + 中心，确保法线朝外（远离质心）
  const faceData = new Map();
  sceneEntities.faces.forEach((face, fid) => {
    if (!face.vertices || face.vertices.length < 3) return;
    const verts = face.vertices.map(v => v.clone());

    const e1=new THREE.Vector3().subVectors(v1,v0), e2=new THREE.Vector3().subVectors(v2,v0);
    let normal=new THREE.Vector3().crossVectors(e1,e2).normalize();
    const ctr=new THREE.Vector3(); verts.forEach(v=>ctr.add(v)); ctr.divideScalar(verts.length);
    // 法线应远离质心（朝外）；若法线指向质心（与朝外方向相反）则翻转
    if (normal.dot(new THREE.Vector3().subVectors(ctr, solidCenter)) < 0) normal.negate();
    faceData.set(fid, { normal, center: ctr.clone(), vertices: verts });

function pointInFace(pt, verts, normal) {
  // For a convex polygon on a plane: project to 2D and check winding
  // Use the dominant axis of the normal to pick projection plane
  const ax = Math.abs(normal.x), ay = Math.abs(normal.y), az = Math.abs(normal.z);
  let proj;
  if (ax >= ay && ax >= az) {
    proj = v => [v.y, v.z]; // project onto YZ
  } else if (ay >= ax && ay >= az) {
    proj = v => [v.x, v.z]; // project onto XZ
  } else {
    proj = v => [v.x, v.y]; // project onto XY
  }
  
  const pt2 = proj(pt);
  let sign = 0;
  for (let i = 0; i < verts.length; i++) {
    const a = proj(verts[i]);
    const b = proj(verts[(i+1) % verts.length]);
    const cross = (b[0]-a[0]) * (pt2[1]-a[1]) - (b[1]-a[1]) * (pt2[0]-a[0]);
    if (i === 0) sign = cross > 0 ? 1 : -1;
    else if ((cross > 0 ? 1 : -1) !== sign) return false;
  }
  return true;
}

// ========== Task 6: SnapEngine ==========
class SnapEngine {
  constructor(camera, rendererEl) {
    this.camera = camera; this.rendererEl = rendererEl;
    this.threshold = 0.15; this.active = true;
    this.snapPoint = null; this.snapType = null; this.snapTargetId = null;
  }
  getMouseRay(event) {
    const rect = this.rendererEl.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    const rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(x, y), this.camera);
    this._lastRay = rc; return rc;
  }
  getMouse3DPoint(event) {
    const ray = this.getMouseRay(event);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const pt = new THREE.Vector3();
    if (ray.ray.intersectPlane(plane, pt)) return pt;
    const dir = new THREE.Vector3();
    this.camera.getWorldDirection(dir);
    const fp = new THREE.Plane(dir, -this.camera.position.dot(dir));
    ray.ray.intersectPlane(fp, pt); return pt;
  }
  snap(event) {
    if (!this.active) return null;
    const ray = this.getMouseRay(event);
    let best = this.threshold, bestPt = null, bestT = null, bestId = null;
    sceneEntities.vertices.forEach((v, id) => {
      const d = ray.ray.distanceToPoint(v.pos);
      if (d < best) { best = d; bestPt = v.pos.clone(); bestT = '\u7AEF\u70B9'; bestId = id; }
    });
    sceneEntities.edges.forEach((e, id) => {
      const p = e.line.geometry.attributes.position.array;
      const mid = new THREE.Vector3((p[0]+p[3])/2, (p[1]+p[4])/2, (p[2]+p[5])/2);
      const d = ray.ray.distanceToPoint(mid);
      if (d < best) { best = d; bestPt = mid.clone(); bestT = '\u4E2D\u70B9'; bestId = id; }
    });
    this.snapPoint = bestPt; this.snapType = bestT; this.snapTargetId = bestId; return bestPt;
  }
}

    let bestDist = Infinity;

    const _ptOnRay = new THREE.Vector3();
    const _ptOnSeg = new THREE.Vector3();
    sceneEntities.edges.forEach((e, id) => {
      const pts = this._getEdgeEndpoints(e);
      if (!pts) return;
      const p1 = pts[0], p2 = pts[1];
      const distSq = raycaster.ray.distanceSqToSegment(p1, p2, _ptOnRay, _ptOnSeg);
      if (distSq < 0) return;
      const dist = Math.sqrt(distSq);
      const distToCam = camera.position.distanceTo(_ptOnSeg);
      const threshold = Math.max(0.08, baseThreshold * (distToCam / 5.0));
      if (dist < threshold && dist < bestDist) {
        bestDist = dist;
        bestId = id;
      }
    });
    if (bestId !== null) {
      return { edge: sceneEntities.edges.get(bestId), id: bestId };
    }
    return { edge: null, id: null };
  },
  _getEdgeEndpoints(edge) {
    const g = edge.line.geometry;
    if (g && g.attributes && g.attributes.instanceStart && g.attributes.instanceEnd) {
      const a = g.attributes.instanceStart.array;
      const b = g.attributes.instanceEnd.array;
      const endOff = b.length >= 6 ? 3 : 0; return [new THREE.Vector3(a[0], a[1], a[2]), new THREE.Vector3(b[endOff], b[endOff+1], b[endOff+2])];
    }
    if (g && g.attributes && g.attributes.position) {
      const p = g.attributes.position.array;
      return [new THREE.Vector3(p[0], p[1], p[2]), new THREE.Vector3(p[3], p[4], p[5])];
    }
    return null;
  },
  _pushUndoState() {
    const state = sceneEntities.auxElements.map(a => ({type:a.type,data:JSON.parse(JSON.stringify(a.data)),visible:a.visible}));
    window._undoStack.push(state); window._redoStack = [];
  },
  _undo() {
    if (window._undoStack.length <= 1) return;
    const cur = sceneEntities.auxElements.map(a => ({type:a.type,data:JSON.parse(JSON.stringify(a.data)),visible:a.visible}));
    window._redoStack.push(cur); this._restoreAux(window._undoStack.pop());
  },
  _clearAll() {
    if (sceneEntities.auxElements.length === 0) return; this._pushUndoState();
    sceneEntities.auxElements.forEach(a => { try { scene.remove(a.group); } catch(e) {} });
    sceneEntities.auxElements = [];
    // 清空后重新检测（应无交点）
    recomputeAllIntersections();
  },
  _toggleAux() {
    const allHidden = sceneEntities.auxElements.length > 0 && sceneEntities.auxElements.every(a => !a.visible);
    const show = allHidden;
    sceneEntities.auxElements.forEach(a => {
      a.visible = show;
      a.group.visible = show;
      a.group.traverse(function(child) {
        child.visible = show;
        if (child.isCSS2DObject && child.element) {
          child.element.style.display = show ? '' : 'none';
        }
      });
    });
    const btn = document.querySelector('[data-tool="toggle-aux"]');
    if (btn) btn.textContent = show ? '\uD83D\uDC41' : '\uD83D\uDC41\u200D\uD83D\uDDE8';
  },
  _addAuxElement(type, data, group) {
    const entry = { type, data, group, visible: true };
    if (group) {
      group.traverse(function(child) { child.visible = true; });
    }
    sceneEntities.auxElements.push(entry); scene.add(group); this._pushUndoState();
    // 新增辅助线后：重新检测与原边/其他辅助线的交点并自动编号
    recomputeAllIntersections();
    return entry;
  },
  _removeAuxByEvent(event) {
    const raycaster = this.snapEngine.getMouseRay(event);
    const camera = this.snapEngine.camera;
    const baseThreshold = 0.3;
    let bestDist = Infinity;
    let bestIdx = -1;
    const _ptOnRay = new THREE.Vector3();
    const _ptOnSeg = new THREE.Vector3();
    for (let i = sceneEntities.auxElements.length - 1; i >= 0; i--) {
      for (const ch of sceneEntities.auxElements[i].group.children) {
        let p1 = null, p2 = null;
        if (ch.isLine && ch.geometry && ch.geometry.attributes) {
          const g = ch.geometry;
          if (g.attributes.instanceStart && g.attributes.instanceEnd) {
            const a = g.attributes.instanceStart.array;
            const b = g.attributes.instanceEnd.array;
      const endOff = b.length >= 6 ? 3 : 0; return [new THREE.Vector3(a[0], a[1], a[2]), new THREE.Vector3(b[endOff], b[endOff+1], b[endOff+2])];
          } else if (g.attributes.position) {
            const p = g.attributes.position.array;
            p1 = new THREE.Vector3(p[0], p[1], p[2]); p2 = new THREE.Vector3(p[3], p[4], p[5]);
          }
        }
        if (!p1 || !p2) {
          if (ch.isCSS2DObject && ch.position) {
            const dist = raycaster.ray.distanceToPoint(ch.position);
            const distToCam = camera.position.distanceTo(ch.position);
            const threshold = Math.max(0.08, baseThreshold * (distToCam / 5.0));
            if (dist < threshold && dist < bestDist) { bestDist = dist; bestIdx = i; }
          }
          continue;
        }
        const distSq = raycaster.ray.distanceSqToSegment(p1, p2, _ptOnRay, _ptOnSeg);
        if (distSq < 0) continue;
        const dist = Math.sqrt(distSq);
        const distToCam = camera.position.distanceTo(_ptOnSeg);
        const threshold = Math.max(0.08, baseThreshold * (distToCam / 5.0));
        if (dist < threshold && dist < bestDist) { bestDist = dist; bestIdx = i; }
      }
    }
    if (bestIdx >= 0) {
      this._pushUndoState();
      try { scene.remove(sceneEntities.auxElements[bestIdx].group); } catch(e) {}
      sceneEntities.auxElements.splice(bestIdx, 1);
      // 删除辅助线后重新检测交点
      recomputeAllIntersections();
      return true;
    }
    return false;
  },
  _restoreAux(arr) {
    sceneEntities.auxElements.forEach(a => { try { scene.remove(a.group); } catch(e) {} });
    sceneEntities.auxElements = [];
    for (const s of arr) {
      const tool = this.tools[s.type];
      if (tool && tool.rebuild) {
        const grp = tool.rebuild(s.data);
        if (grp) {
          const entry = { type: s.type, data: s.data, group: grp, visible: s.visible !== false };
          entry.group.visible = entry.visible; sceneEntities.auxElements.push(entry); scene.add(grp);
        }
      }
    }
    // 撤销/重做后重新检测交点
    recomputeAllIntersections();
  }
};

// ========== Helper functions ==========

function makeGroup() { return new THREE.Group(); }

function makeLine(p1, p2, color, dashed) {
  const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
  const mat = dashed ? new THREE.LineDashedMaterial({color:color||0x339af0,dashSize:0.04,gapSize:0.04}) : new THREE.LineBasicMaterial({color:color||0x339af0});
  const ln = new THREE.Line(geo, mat); if (dashed) ln.computeLineDistances(); return ln;
}

function makeCircle(center, radius, color, dashed) {
  const pts = [];
  for (let i = 0; i <= 64; i++) { const theta = (i/64)*Math.PI*2; pts.push(new THREE.Vector3(center.x+radius*Math.cos(theta), center.y, center.z+radius*Math.sin(theta))); }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = dashed ? new THREE.LineDashedMaterial({color:color||0x339af0,dashSize:0.04,gapSize:0.04}) : new THREE.LineBasicMaterial({color:color||0x339af0});
  const ln = new THREE.Line(geo, mat); if (dashed) ln.computeLineDistances(); return ln;
}

function makeFace(points, color) {
  if (points.length < 3) return null;
  const pos = [];
  for (let i = 1; i < points.length-1; i++) {
    pos.push(points[0].x,points[0].y,points[0].z, points[i].x,points[i].y,points[i].z, points[i+1].x,points[i+1].y,points[i+1].z);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.computeVertexNormals();
  const mat = new THREE.MeshPhongMaterial({color:color||0x339af0,transparent:true,opacity:0.3,side:THREE.DoubleSide,depthWrite:false});
  return new THREE.Mesh(geo, mat);
}

// ========== Debug Helpers (browser console) ==========

// 用法：在浏览器控制台调用 window.__debugVertices() 查看 sceneEntities.vertices 全量分布

//       或 window.__debugRecompute() 触发一次重算并打 before/after 快照
window.__debugVertices = function () {
  const result = { original: [], intersections: [], other: [], allIds: [] };
  sceneEntities.vertices.forEach((v, id) => {
    result.allIds.push(id);
    if (v.isOriginal) {
      result.original.push({ id, pos: v.pos ? v.pos.toArray() : null });
    } else if (v.isIntersection) {
      result.intersections.push({ id, pos: v.pos ? v.pos.toArray() : null });
    } else {
      result.other.push({ id, hasMesh: !!v.mesh, hasLabel: !!v.label, pos: v.pos ? v.pos.toArray() : null });
    }
  });
  console.log('[__debugVertices] original:', result.original);
  console.log('[__debugVertices] intersections:', result.intersections);
  console.log('[__debugVertices] other (neither original nor intersection):', result.other);
  console.log('[__debugVertices] allIds:', result.allIds);
  return result;
};
window.__debugRecompute = function () {
  console.log('[__debugRecompute] before, vertices:', Array.from(sceneEntities.vertices.keys()));
  recomputeAllIntersections();
  console.log('[__debugRecompute] after, vertices:', Array.from(sceneEntities.vertices.keys()));
  return window.__debugVertices();
};

async function loadCurrentProblem() {
  const statusHint = document.getElementById("status-hint");
  if (statusHint) statusHint.textContent = "正在加载题目数据...";
  try {
    const response = await fetch("problems/current.json", { cache: "no-store" });
    if (!response.ok) throw new Error("HTTP " + response.status);
    const data = await response.json();
    init(data);
    if (statusHint) statusHint.textContent = "图形已生成";
  } catch (error) {
    console.error("Failed to load problem data", error);
    init(fallbackGeometryData);
    if (statusHint) statusHint.textContent = "图形加载失败，已显示空白模板";
  }
}

loadCurrentProblem();

</script>
